name: Deploy Cloudflare Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # 根据你的 Go 框架解开注释放入构建逻辑，例如：
      # - name: Build Go Project (WASM)
      #   run: |
      #     GOOS=js GOARCH=wasm go build -o build/app.wasm main.go

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Execute D1 Setup / Update
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "Executing D1 SQL schema update..."
          # 使用 API Token 静默执行远端 D1 数据库 SQL 导入
          wrangler d1 execute sjtuaa-db --file=./setup_db.sql --remote

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "Deploying Go worker to Cloudflare..."
          wrangler deploy
