name: Deploy Cloudflare Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Go Project (WASM)
        run: |
          mkdir -p build
          # 下载依赖
          go mod tidy
          # 编译 Go 到 WebAssembly
          GOOS=js GOARCH=wasm go build -o build/app.wasm .
          # 根据 Wasm 生成 Cloudflare 运行所需的 JS Worker
          go run github.com/syumai/workers/cmd/workers-assets-gen@latest
          ls -la build/

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Execute D1 Setup / Update
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "Executing D1 SQL schema update..."
          wrangler d1 execute sjtuaa-db --file=./setup_db.sql --remote

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "Deploying Go worker to Cloudflare..."
          wrangler deploy
